name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    uses: wppoland/workflows/.github/workflows/_php-ci.yml@v1
    with:
      slug: plogins-shortlist
      # Front-end JS/CSS is hand-written static (no npm build step).
      has-js: false
      run-i18n: false
      run-playwright: false
      # Plugin Check = wp.org submission gate; enable when prepping submission.
      run-plugin-check: true
